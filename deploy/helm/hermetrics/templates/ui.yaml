apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hermetrics.fullname" . }}-ui
  labels:
    {{- include "hermetrics.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "hermetrics.fullname" . }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "hermetrics.labels" . | nindent 8 }}
        app.kubernetes.io/name: {{ include "hermetrics.fullname" . }}
        app.kubernetes.io/component: ui
    spec:
      {{- include "hermetrics.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "hermetrics.podSecurityContext" . | nindent 8 }}
      containers:
        - name: ui
          image: "{{ .Values.image.registry }}{{ .Values.image.ui.repository }}:{{ .Values.image.ui.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: LISTEN_PORT
              value: "8080"
            - name: API_UPSTREAM
              value: "{{ include "hermetrics.fullname" . }}-api:8080"
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          securityContext:
            {{- include "hermetrics.containerSecurityContext" . | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hermetrics.fullname" . }}-ui
  labels:
    {{- include "hermetrics.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  selector:
    app.kubernetes.io/name: {{ include "hermetrics.fullname" . }}
    app.kubernetes.io/component: ui
  ports:
    - { name: http, port: 8080, targetPort: http }
