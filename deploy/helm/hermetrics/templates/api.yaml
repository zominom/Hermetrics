apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hermetrics.fullname" . }}-api
  labels:
    {{- include "hermetrics.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "hermetrics.fullname" . }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "hermetrics.labels" . | nindent 8 }}
        app.kubernetes.io/name: {{ include "hermetrics.fullname" . }}
        app.kubernetes.io/component: api
    spec:
      {{- include "hermetrics.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- include "hermetrics.podSecurityContext" . | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.registry }}{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: http, containerPort: 8080 }
          volumeMounts:
            - name: api-config
              mountPath: {{ .Values.api.configMountDir }}
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            {{- include "hermetrics.containerSecurityContext" . | nindent 12 }}
      volumes:
        - name: api-config
          secret:
            secretName: {{ include "hermetrics.fullname" . }}-api-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hermetrics.fullname" . }}-api
  labels:
    {{- include "hermetrics.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: {{ include "hermetrics.fullname" . }}
    app.kubernetes.io/component: api
  ports:
    - { name: http, port: 8080, targetPort: http }
